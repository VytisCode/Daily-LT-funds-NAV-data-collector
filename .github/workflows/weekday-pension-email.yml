name: Daily Pension Automation

on:
  workflow_dispatch:
  schedule:
    # 07:00 Europe/Vilnius across DST changes
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Wrapper notification credentials
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      TO_EMAIL: ${{ secrets.TO_EMAIL }}

      # Backward compatibility for existing send_email.py
      GMAIL_USER: ${{ secrets.EMAIL_USER }}
      GMAIL_PASSWORD: ${{ secrets.EMAIL_PASS }}
      RECIPIENT_EMAIL: ${{ secrets.TO_EMAIL }}

      # Headless runtime flags
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Gate schedule to exactly 07:00 Europe/Vilnius
        id: schedule_gate
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=Europe/Vilnius date +%H)"
          local_minute="$(TZ=Europe/Vilnius date +%M)"

          if [[ "$local_hour" == "07" && "$local_minute" == "00" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping. Local Europe/Vilnius time is $(TZ=Europe/Vilnius date '+%Y-%m-%d %H:%M:%S %Z')."
          fi

      - name: Install dependencies
        if: steps.schedule_gate.outputs.run == 'true'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-cache-dir -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Validate required environment variables
        if: steps.schedule_gate.outputs.run == 'true'
        shell: bash
        run: |
          echo "EMAIL_USER: ${EMAIL_USER:+set}"
          echo "EMAIL_PASS: ${EMAIL_PASS:+set}"
          echo "TO_EMAIL: ${TO_EMAIL:+set}"
          if [[ -z "$EMAIL_USER" || -z "$EMAIL_PASS" || -z "$TO_EMAIL" ]]; then
            echo "ERROR: Missing required secrets: EMAIL_USER, EMAIL_PASS, TO_EMAIL"
            exit 1
          fi

      - name: Run automation wrapper
        if: steps.schedule_gate.outputs.run == 'true'
        shell: bash
        run: |
          source .venv/bin/activate
          python main_wrapper.py

      - name: Upload logs and generated files
        if: steps.schedule_gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-artifacts
          path: |
            logs/*.log
            *_data_*.xlsx
            pension_data_combined_*.xlsx
          if-no-files-found: warn
